{% extends "planer/base.html" %}
{% block title %}Löschen bestätigen{% endblock %}

{% block content %}
<div class="row justify-content-center">
  <div class="col-md-6 text-center">
    <h2 class="mb-3">Wirklich löschen?</h2>
    <p class="mb-4">„<strong>{{ object }}</strong>" wird dauerhaft gelöscht.</p>
    <form method="post">
      {% csrf_token %}
      <button type="submit" class="btn btn-danger me-2">Ja, löschen</button>
      {% if cancel_pk %}
        <a href="{% url cancel_url cancel_pk %}" class="btn btn-secondary">Abbrechen</a>
      {% else %}
        <a href="{% url cancel_url %}" class="btn btn-secondary">Abbrechen</a>
      {% endif %}
    </form>
  </div>
</div>
{% endblock %}
